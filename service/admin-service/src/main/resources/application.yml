server:
  port: 9100

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://biday-eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: refresh

spring:
  output:
    ansi:
      enabled: always
  application:
    name: admin-service
  profiles:
    active: local
  config:
    import: optional:configserver:http://localhost:8888/

  jpa:
    hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
      time-zone: UTC

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/bidaydb
    username: root
    password: biday

openapi:
  service:
    url: http://localhost:8000
springdoc:
  api-docs:
    path: /api/faqs/v3/api-docs
  swagger-ui:
    path: /swagger-ui