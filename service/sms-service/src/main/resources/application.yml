server:
  port: 9105

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://biday-eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: refresh

spring:
  output:
    ansi:
      enabled: always
  application:
    name: sms-service
  profiles:
    active: local
  config:
    import: optional:configserver:http://localhost:8888/